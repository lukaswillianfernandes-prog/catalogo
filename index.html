<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LF Camisas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#fff;color:#1a1a1a}

/* Header */
.header{background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:16px;padding:14px 24px}
.logo{font-size:22px;font-weight:700;color:#1a1a1a;white-space:nowrap;text-decoration:none}
.logo span{color:#16a34a}
.search-wrap{flex:1;max-width:600px;position:relative}
.search-wrap input{width:100%;padding:10px 44px 10px 16px;border:2px solid #e5e5e5;border-radius:999px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:#16a34a}
.search-wrap button{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888}
.header-actions{display:flex;align-items:center;gap:16px;margin-left:auto}
.wa-header{display:flex;align-items:center;gap:8px;background:#25d366;color:#fff;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap}
.wa-header svg{width:18px;height:18px;fill:#fff}

/* Nav */
.nav{background:#1a1a1a;padding:0 24px;display:flex;gap:4px;overflow-x:auto}
.nav a{color:#ccc;font-size:13px;font-weight:500;padding:11px 14px;text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.nav a:hover,.nav a.active{color:#fff;border-bottom-color:#16a34a}

/* Layout */
.container{display:flex;min-height:calc(100vh - 110px)}

/* Sidebar */
.sidebar{width:220px;flex-shrink:0;border-right:1px solid #f0f0f0;padding:20px 0;background:#fafafa}
.sidebar-section{margin-bottom:8px}
.sidebar-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.08em;padding:8px 20px 6px}
.sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;font-size:13px;color:#444;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.sidebar-item:hover{background:#f0f0f0;color:#1a1a1a}
.sidebar-item.active{background:#f0fdf4;color:#16a34a;border-left-color:#16a34a;font-weight:600}
.sidebar-item .count{background:#e5e5e5;color:#666;font-size:10px;padding:1px 6px;border-radius:999px}
.sidebar-item.active .count{background:#dcfce7;color:#16a34a}

/* Main */
.main{flex:1;padding:24px}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.main-title{font-size:18px;font-weight:700}
.main-sub{font-size:13px;color:#888;margin-top:2px}
.sort-select{padding:8px 12px;border:1px solid #e5e5e5;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;color:#444;cursor:pointer}

/* Products grid */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.prod-card{background:#fff;border:1px solid #eee;border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.prod-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px);border-color:#d1d5db}
.prod-img-wrap{padding:12px 12px 0;background:#f8f8f8}
.prod-img-wrap img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;display:block;background:#eee}
.prod-img-wrap .no-img{width:100%;aspect-ratio:1;background:#f0f0f0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#bbb}
.prod-info{padding:12px}
.prod-name{font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.4;margin-bottom:4px}
.prod-cat{font-size:11px;color:#888}
.prod-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.prod-photos{font-size:11px;color:#aaa}
.prod-btn{background:#16a34a;color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.prod-btn:hover{background:#15803d}
.prod-badge{position:absolute;top:10px;left:10px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px}
.prod-badge.new{background:#16a34a}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lb-box{background:#fff;border-radius:16px;overflow:hidden;max-width:900px;width:95vw;max-height:90vh;display:flex;flex-direction:column}
.lb-header{padding:16px 20px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.lb-title{font-size:15px;font-weight:700}
.lb-close{background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1}
.lb-body{display:flex;flex:1;overflow:hidden}
.lb-imgs{flex:1;padding:20px;background:#f8f8f8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.lb-main-img{max-width:100%;max-height:400px;object-fit:contain;border-radius:8px}
.lb-thumbs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.lb-thumb{width:56px;height:56px;object-fit:cover;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:border-color .15s}
.lb-thumb.active,.lb-thumb:hover{border-color:#16a34a}
.lb-side{width:260px;padding:20px;display:flex;flex-direction:column;gap:12px}
.lb-cat{font-size:12px;color:#16a34a;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.lb-name{font-size:16px;font-weight:700;line-height:1.4}
.lb-wa{display:flex;align-items:center;justify-content:center;gap:8px;background:#25d366;color:#fff;padding:12px;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;margin-top:auto}
.lb-wa svg{width:20px;height:20px;fill:#fff}
.lb-nav{display:flex;gap:8px;margin-top:8px}
.lb-nav button{flex:1;padding:8px;background:#f5f5f5;border:1px solid #e5e5e5;border-radius:8px;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif}
.lb-nav button:hover{background:#eee}

/* WhatsApp float */
.wa-float{position:fixed;bottom:24px;right:24px;z-index:500;background:#25d366;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,211,102,.4);cursor:pointer;text-decoration:none;transition:transform .2s}
.wa-float:hover{transform:scale(1.1)}
.wa-float svg{width:28px;height:28px;fill:#fff}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:#888;gap:16px;grid-column:1/-1}
.spinner{width:36px;height:36px;border:3px solid #e5e5e5;border-top-color:#16a34a;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:60px;text-align:center;color:#888;font-size:14px;grid-column:1/-1}

@media(max-width:768px){
  .sidebar{display:none}
  .header-top{padding:10px 16px}
  .main{padding:16px}
  .products-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .lb-body{flex-direction:column}
  .lb-side{width:100%;padding:16px}
}
</style>
</head>

<script>
const PROXY = 'https://yupoo-proxy.lukaswillianfernandes.workers.dev';
const JSON_URL = 'https://raw.githubusercontent.com/lukaswillianfernandes-prog/catalogo/main/yupoo_catalog.json';
const WA_NUM = '5555996702674';

const IGNORAR_CAT = ['Promoções','Kids Tracksuit','Website shopping tutorial',
  'Casual T-shirt','Windbreaker','Patch !','sock','Shorts','SIZE',
  'Call Me Whatsapp','Call Me →','Player','Total classification',
  'NBA Silk version','F1','NFL','MLB','NHL','Hat',"kids'",'Woman',
  'retro style 2','Baby jersey size:9-12','Kings League'];

const CAT_ORDER = ['New Arrivals','Premier League','La Liga','Serie A','Bundesliga','Ligue 1',
  'Brasileiro Série A','Liga Portugal','Superliga Argentina','Dutch Eredivisie','Scottish League',
  'Liga MX','Saudi Professional League','MLS','Chile League','Japan League',
  'UEFA Euro 2024','2026 World Cup','National Team','Retro'];

function px(u){ return u ? PROXY+'?url='+encodeURIComponent(u) : ''; }

function clean(n){
  if(!n) return '';
  n = n.replace(/<[^>]+>/g,'').trim();
  n = n.replace(/\s+S-\w+\d*$/i,'').trim();
  n = n.replace(/([a-zA-Z])(\d+)$/,'$1').trim();
  return n;
}

function blocked(name){
  const n = name.toLowerCase();
  return n.includes('windbreaker') || n.includes('keychain') || n.includes('chaveiro') || n.includes('keyring');
}

function yr(name){
  const s = name.match(/\b(\d{2})\/(\d{2})\b/);
  if(s) return 2000+parseInt(s[1]);
  const m = name.match(/\b(19|20)(\d{2})\b/);
  return m ? parseInt(m[0]) : 0;
}

function largeImgs(imgs){
  const l = imgs.filter(u=>u&&u.includes('/large.'));
  return l.length ? l : (imgs.length?[imgs[0]]:[]);
}

let catalog=[], current=[], currentCat='', sortMode='recent';
let lbImgs=[], lbIdx=0, lbAlbum=null;

async function init(){
  try{
    const r = await fetch(JSON_URL);
    catalog = await r.json();
    buildNav();
    buildSidebar();
    showAll();
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="empty">Erro ao carregar. Recarregue a página.</div>';
  }
}

function getCats(){
  const s=new Set();
  catalog.forEach(a=>{if(!IGNORAR_CAT.includes(a.cat)&&!blocked(clean(a.album)))s.add(a.cat);});
  const res=CAT_ORDER.filter(c=>s.has(c));
  s.forEach(c=>{if(!res.includes(c))res.push(c);});
  return res;
}

function buildNav(){
  const cats=getCats();
  document.getElementById('topNav').innerHTML=
    `<a class="active" onclick="showAll()">Todos</a>`+
    cats.map(c=>`<a onclick="filterCat('${c.replace(/'/g,"\\'")}','this')">${c}</a>`).join('');
}

function buildSidebar(){
  const cats=getCats();
  const groups={
    'Ligas Europeias':['Premier League','La Liga','Serie A','Bundesliga','Ligue 1','Liga Portugal','Dutch Eredivisie','Scottish League'],
    'Américas':['Brasileiro Série A','Superliga Argentina','Liga MX','MLS','Chile League'],
    'Seleções':['National Team','2026 World Cup','UEFA Euro 2024'],
    'Especiais':['New Arrivals','Retro'],
    'Outros':[]
  };
  const used=new Set(Object.values(groups).flat());
  cats.forEach(c=>{if(!used.has(c))groups['Outros'].push(c);});

  let html='';
  for(const [g,items] of Object.entries(groups)){
    const filtered=items.filter(c=>cats.includes(c));
    if(!filtered.length) continue;
    html+=`<div class="sidebar-section"><div class="sidebar-title">${g}</div>`;
    filtered.forEach(c=>{
      const n=catalog.filter(a=>a.cat===c&&!blocked(clean(a.album))).length;
      html+=`<div class="sidebar-item${c===currentCat?' active':''}" onclick="filterCat('${c.replace(/'/g,"\\'")}')">
        <span>${c}</span><span class="count">${n}</span></div>`;
    });
    html+='</div>';
  }
  document.getElementById('sidebar').innerHTML=html;
}

function showAll(){
  currentCat='';
  current=catalog.filter(a=>!IGNORAR_CAT.includes(a.cat)&&!blocked(clean(a.album)));
  applySort();
  document.getElementById('mainTitle').textContent='Todos os produtos';
  document.getElementById('mainSub').textContent=current.length+' produtos';
  document.getElementById('q').value='';
  buildSidebar();
  setActiveNav(null);
}

function filterCat(cat){
  currentCat=cat;
  current=catalog.filter(a=>a.cat===cat&&!blocked(clean(a.album)));
  applySort();
  document.getElementById('mainTitle').textContent=cat;
  document.getElementById('mainSub').textContent=current.length+' produtos';
  document.getElementById('q').value='';
  buildSidebar();
  setActiveNav(cat);
}

function setActiveNav(cat){
  document.querySelectorAll('.nav a').forEach(a=>{
    a.classList.toggle('active', cat===null?a.textContent==='Todos':a.textContent===cat);
  });
}

function sortProducts(val){
  sortMode=val;
  applySort();
}

function applySort(){
  let arr=[...current];
  if(sortMode==='recent') arr.sort((a,b)=>yr(clean(b.album))-yr(clean(a.album)));
  else if(sortMode==='az') arr.sort((a,b)=>clean(a.album).localeCompare(clean(b.album)));
  else arr.sort((a,b)=>clean(b.album).localeCompare(clean(a.album)));
  renderGrid(arr);
}

function renderGrid(items){
  if(!items.length){
    document.getElementById('grid').innerHTML='<div class="empty">Nenhum produto encontrado.</div>';
    return;
  }
  document.getElementById('grid').innerHTML=items.map(a=>{
    const imgs=largeImgs(a.images);
    const name=clean(a.album);
    const isNew=yr(name)>=2025;
    const img=imgs.length
      ?`<img src="${px(imgs[0])}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'no-img\\'>Sem imagem</div>'">`
      :`<div class="no-img">Sem imagem</div>`;
    return `<div class="prod-card" onclick="openLb('${a.albumId}')">
      ${isNew?'<span class="prod-badge new">NOVO</span>':''}
      <div class="prod-img-wrap">${img}</div>
      <div class="prod-info">
        <div class="prod-name">${name}</div>
        <div class="prod-cat">${a.cat}</div>
        <div class="prod-footer">
          <span class="prod-photos">${imgs.length} foto(s)</span>
          <button class="prod-btn" onclick="event.stopPropagation();openWa('${name.replace(/'/g,"\\'")}')">Pedir</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function doSearch(q){
  q=q.trim().toLowerCase();
  if(!q){
    if(currentCat) filterCat(currentCat);
    else showAll();
    return;
  }
  const res=catalog.filter(a=>
    !blocked(clean(a.album))&&
    (clean(a.album).toLowerCase().includes(q)||a.cat.toLowerCase().includes(q))
  );
  document.getElementById('mainTitle').textContent='Resultados para "'+q+'"';
  document.getElementById('mainSub').textContent=res.length+' produtos';
  renderGrid(res);
}

function openWa(name){
  const msg=encodeURIComponent('Olá! Tenho interesse na camisa: '+name);
  window.open('https://wa.me/'+WA_NUM+'?text='+msg,'_blank');
}

function openLb(id){
  const a=catalog.find(x=>x.albumId===id); if(!a) return;
  lbAlbum=a;
  lbImgs=largeImgs(a.images); lbIdx=0;
  const name=clean(a.album);
  document.getElementById('lbTitle').textContent=name;
  document.getElementById('lbName').textContent=name;
  document.getElementById('lbCat').textContent=a.cat;
  const msg=encodeURIComponent('Olá! Tenho interesse na camisa: '+name);
  document.getElementById('lbWa').href='https://wa.me/'+WA_NUM+'?text='+msg;
  updLb();
  document.getElementById('lb').classList.add('open');
}

function updLb(){
  document.getElementById('lbMain').src=px(lbImgs[lbIdx]);
  document.getElementById('lbThumbs').innerHTML=lbImgs.map((u,i)=>
    `<img class="lb-thumb${i===lbIdx?' active':''}" src="${px(u)}" onclick="lbGo(${i})" loading="lazy">`
  ).join('');
}

function lbGo(i){ lbIdx=i; updLb(); }
function lbMove(d){ lbIdx=(lbIdx+d+lbImgs.length)%lbImgs.length; updLb(); }
function closeLb(){ document.getElementById('lb').classList.remove('open'); }
function lbBg(e){ if(e.target===document.getElementById('lb')) closeLb(); }

document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open')) return;
  if(e.key==='ArrowRight') lbMove(1);
  if(e.key==='ArrowLeft') lbMove(-1);
  if(e.key==='Escape') closeLb();
});

// Atualiza número WhatsApp
document.querySelectorAll('a[href*="wa.me"]').forEach(a=>{
  if(a.href.includes('5500000000000')) a.href=a.href.replace('5500000000000',WA_NUM);
});

init();
</script>
